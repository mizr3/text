<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gothic/Monospace Text Editor</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --accent-color: #4dabf7;
            --accent-hover: #339af0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* ダークモード */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1b1e;
                --container-bg: #25262b;
                --text-color: #c1c2c5;
                --border-color: #373a40;
                --accent-color: #3b5bdb;
                --accent-hover: #4c6ef5;
                --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .editor-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            overflow: hidden;
        }

        /* ツールバー */
        .toolbar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background-color: var(--container-bg);
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        select, input[type="text"] {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--container-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        input[type="text"] {
            width: 160px;
        }

        /* ダウンロードボタン */
        .btn-download {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-download:hover {
            background-color: var(--accent-hover);
        }

        /* エディタエリア */
        .textarea-wrapper {
            flex-grow: 1;
            position: relative;
        }

        /* 等幅フォントでスペースを分かりやすく */
        textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            padding: 20px;
            background-color: transparent;
            color: var(--text-color);
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            /* タブ幅を4文字分にする設定 */
            tab-size: 4;
            -moz-tab-size: 4;
        }

        /* フォントクラス */
        .font-monospace {
            /* 全角・半角スペースの幅が揃いやすい等幅（コーディング用）フォント */
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, "BIZ UDゴシック", "Meiryo UI", monospace;
        }

        .font-gothic {
            /* スッキリとした角ゴシック */
            font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        }

        /* ステータスバー */
        .statusbar {
            padding: 8px 16px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: #868e96;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <!-- ツールバー -->
        <div class="toolbar">
            <div class="tool-group">
                <label for="font-select">フォント:</label>
                <select id="font-select">
                    <option value="font-monospace" selected>等幅ゴシック (推奨)</option>
                    <option value="font-gothic">標準ゴシック</option>
                </select>
            </div>

            <div class="tool-group" style="margin-left: auto;">
                <input type="text" id="filename-input" value="document" placeholder="ファイル名">
                <span>.txt</span>
                <button class="btn-download" id="download-btn">
                    保存 / ダウンロード
                </button>
            </div>
        </div>

        <!-- テキストエリア -->
        <div class="textarea-wrapper">
            <textarea id="text-editor" class="font-monospace" placeholder="ここにテキストを入力してください..."></textarea>
        </div>

        <!-- ステータスバー -->
        <div class="statusbar">
            <div id="char-count">文字数: 0 | 行数: 1</div>
            <div>自動保存中（ブラウザ内）</div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('text-editor');
        const fontSelect = document.getElementById('font-select');
        const filenameInput = document.getElementById('filename-input');
        const downloadBtn = document.getElementById('download-btn');
        const charCount = document.getElementById('char-count');

        // 1. ローカルストレージからの自動復元
        window.addEventListener('DOMContentLoaded', () => {
            const savedText = localStorage.getItem('local_editor_text');
            if (savedText) {
                editor.value = savedText;
                updateStats();
            }
        });

        // 2. 入力時の自動保存 & 統計更新
        editor.addEventListener('input', () => {
            localStorage.setItem('local_editor_text', editor.value);
            updateStats();
        });

        function updateStats() {
            const text = editor.value;
            const chars = text.length;
            const lines = text.split('\n').length;
            charCount.textContent = `文字数: ${chars} | 行数: ${lines}`;
        }

        // 3. フォント切り替え
        fontSelect.addEventListener('change', (e) => {
            const selectedClass = e.target.value;
            editor.className = selectedClass;
        });

        // 4. TXTファイルとしてダウンロード
        downloadBtn.addEventListener('click', () => {
            const textContent = editor.value;
            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            
            // ファイル名を取得（未入力なら 'document' にフォールバック）
            let filename = filenameInput.value.trim();
            if (!filename) {
                 filename = 'document';
            }
            filename += '.txt';

            // 一時的なダウンロードリンクを作成してクリックを発火
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();

            // メモリの解放
            URL.revokeObjectURL(link.href);
        });

        // Tabキーの入力でインデント（スペース4つ）を挿入可能にする
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;

                // テキストの間にスペース4つを挿入
                editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);

                // カーソル位置をスペースの後に移動
                editor.selectionStart = editor.selectionEnd = start + 4;
                
                // ストレージと文字数を更新
                localStorage.setItem('local_editor_text', editor.value);
                updateStats();
            }
        });
    </script>
</body>
</html>
