<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fixed Layout Text Editor</title>
    <style>
        /* カラー変数の定義 */
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --accent-color: #4dabf7;
            --accent-hover: #339af0;
            --toolbar-bg: #f1f3f5;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --status-text: #495057; 
            --scrollbar-thumb: rgba(0, 0, 0, 0.2);
            --scrollbar-track: rgba(0, 0, 0, 0.05);
        }

        /* ダークモードクラス（bodyに適用して全体の色を変える） */
        body.dark-theme {
            --bg-color: #1a1b1e;
            --container-bg: #25262b;
            --text-color: #c1c2c5;
            --border-color: #373a40;
            --accent-color: #3b5bdb;
            --accent-hover: #4c6ef5;
            --toolbar-bg: #2c2e33;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --status-text: #adb5bd; 
            --scrollbar-thumb: rgba(255, 255, 255, 0.25);
            --scrollbar-track: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 画面全体のスクロールを完全に禁止し、バウンスを防止 */
        html {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            position: fixed;
            touch-action: none; /* 全体的なスワイプジェスチャーを制限 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            overflow: hidden;
            padding: 10px 0; /* 上下に安全な隙間を設置 */
            transition: background-color 0.2s, color 0.2s;
            touch-action: none;
        }

        /* 横幅をウィンドウの95%まで拡大。動的にJSで高さを制御 */
        .editor-container {
            width: 95%; 
            max-width: 1400px;
            height: 100%;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden; 
            touch-action: none; /* コンテナ全体のバウンスも抑止 */
        }

        /* ツールバー */
        .toolbar {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background-color: var(--toolbar-bg);
            flex-shrink: 0;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        select, input[type="text"], input[type="number"] {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--container-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
        }

        select:focus, input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--accent-color);
        }

        /* ボタン共通スタイル */
        .btn {
            background-color: var(--container-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            user-select: none;
        }

        .btn:hover {
            background-color: var(--border-color);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* エディタエリアのラッパー */
        .textarea-wrapper {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        /* テキストボックスのみ縦スクロール、かつ右側スクロールバー常時表示 */
        textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            padding: 20px;
            background-color: transparent;
            color: var(--text-color);
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            tab-size: 4;
            -moz-tab-size: 4;
            
            overflow-y: scroll; /* 縦スクロールバーを「常に」表示 */
            overflow-x: hidden; 
            
            font-variant-east-asian: full-width;
            text-rendering: optimizeLegibility;
            
            /* iPad/iOSで指スクロールが途切れないようにする設定 */
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y; /* 縦方向の指スクロールのみをテキストボックスに許可 */
        }

        /* 右側に常に明確なスクロールバーを表示するためのカスタムスタイル (iPad / Chrome対応) */
        textarea::-webkit-scrollbar {
            width: 10px; /* スクロールバーの横幅 */
            display: block;
        }

        textarea::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 0 4px 4px 0;
        }

        textarea::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 5px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        /* フォントクラスの定義 */
        .font-monospace {
            font-family: "BIZ UDゴシック", "BIZ UDMonospace", "Osaka-mono", "MS Gothic", "MS ゴシック", monospace;
        }

        .font-gothic {
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        }

        /* 検索・置換・ジャンプの複合ポップアップパネル */
        .search-panel {
            position: absolute;
            top: 60px;
            right: 20px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 14px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            width: 340px;
        }

        .search-panel.active {
            display: flex;
        }

        .search-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .search-row label {
            width: 75px;
            flex-shrink: 0;
            font-size: 0.85rem;
        }

        .search-row input {
            flex-grow: 1;
        }

        .search-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 4px 0;
        }

        /* ステータスバー */
        .statusbar {
            padding: 8px 16px;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem; 
            color: var(--status-text); 
            font-weight: 500; 
            display: flex;
            justify-content: space-between;
            background-color: var(--toolbar-bg);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="editor-container" id="editor-container">
        <!-- ツールバー -->
        <div class="toolbar" id="toolbar">
            <div class="tool-group">
                <button class="btn" id="theme-toggle-btn">☀️/🌙 テーマ</button>
                <button class="btn" id="search-toggle-btn">🔍 検索・置換・移動</button>
            </div>

            <div class="tool-group">
                <label for="font-select">フォント:</label>
                <select id="font-select">
                    <option value="font-monospace" selected>等幅ゴシック (推奨)</option>
                    <option value="font-gothic">標準ゴシック</option>
                </select>
            </div>

            <div class="tool-group" style="margin-left: auto;">
                <input type="text" id="filename-input" value="document" placeholder="ファイル名">
                <span>.txt</span>
                <button class="btn btn-primary" id="download-btn">保存/DL</button>
            </div>
        </div>

        <!-- 検索・置換・移動ポップアップ -->
        <div class="search-panel" id="search-panel">
            <div class="search-row">
                <label>検索:</label>
                <input type="text" id="search-input" placeholder="検索する文字列">
            </div>
            <div class="search-row">
                <label>置換:</label>
                <input type="text" id="replace-input" placeholder="置換後の文字列">
            </div>
            <div class="search-actions">
                <button class="btn" id="btn-find-next" style="font-size:0.8rem;">次を検索</button>
                <button class="btn" id="btn-replace" style="font-size:0.8rem;">置換</button>
                <button class="btn" id="btn-replace-all" style="font-size:0.8rem;">すべて置換</button>
            </div>

            <div class="divider"></div>

            <!-- %位置への移動機能 -->
            <div class="search-row">
                <label>位置指定 (%):</label>
                <input type="number" id="jump-percent-input" min="0" max="100" value="50" style="width: 70px; flex-grow: 0;">
                <button class="btn btn-primary" id="btn-jump-percent" style="font-size:0.8rem; flex-grow: 1; justify-content: center;">指定位置に移動</button>
            </div>

            <div class="divider"></div>

            <div class="search-actions">
                <button class="btn" id="btn-close-search" style="font-size:0.8rem; background:#fa5252; color:white; border:none; width: 100%; justify-content: center;">閉じる</button>
            </div>
        </div>

        <!-- テキストエリア -->
        <div class="textarea-wrapper">
            <textarea id="text-editor" class="font-monospace" placeholder="ここにテキストを入力してください...&#10;※全角記号や空白の幅もしっかり揃います。"></textarea>
        </div>

        <!-- ステータスバー -->
        <div class="statusbar" id="statusbar">
            <div id="char-count">文字数: 0 | 行数: 1</div>
            <div id="search-status"></div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('text-editor');
        const fontSelect = document.getElementById('font-select');
        const filenameInput = document.getElementById('filename-input');
        const downloadBtn = document.getElementById('download-btn');
        const charCount = document.getElementById('char-count');
        
        // パネル・ツール関連の要素
        const themeToggleBtn = document.getElementById('theme-toggle-btn');
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchPanel = document.getElementById('search-panel');
        const searchInput = document.getElementById('search-input');
        const replaceInput = document.getElementById('replace-input');
        const btnFindNext = document.getElementById('btn-find-next');
        const btnReplace = document.getElementById('btn-replace');
        const btnReplaceAll = document.getElementById('btn-replace-all');
        const btnCloseSearch = document.getElementById('btn-close-search');
        const searchStatus = document.getElementById('search-status');
        
        // ジャンプ機能用要素
        const jumpPercentInput = document.getElementById('jump-percent-input');
        const btnJumpPercent = document.getElementById('btn-jump-percent');

        let lastSearchIndex = 0;

        // iPad / iPhone 等でエディタ外部の余白をタッチ・スワイプした際のバウンススクロールを物理的に完全禁止
        document.addEventListener('touchmove', function(e) {
            // textarea内部、ツールバー、ポップアップ以外の領域で指が動いたらスクロール処理を打ち切る
            if (!e.target.closest('#text-editor') && 
                !e.target.closest('.search-panel') && 
                !e.target.closest('#toolbar')) {
                e.preventDefault();
            }
        }, { passive: false });

        // iPad / iPhone などのソフトウェアキーボード立ち上がり時、および画面回転時のレイアウト・ズレ対策
        const adjustViewportHeight = () => {
            if (window.visualViewport) {
                // キーボードを考慮した、現在「実際に見えている領域」の高さを取得
                const targetHeight = window.visualViewport.height;
                // bodyのサイズをこの高さに固定することで、キーボード表示時の上への画面ズレを完全防止
                document.body.style.height = `${targetHeight}px`;
                // ページ自体の意図しないスクロール位置を常に原点に引き戻す
                window.scrollTo(0, 0);
            } else {
                document.body.style.height = `${window.innerHeight}px`;
            }
        };

        // イベント監視
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustViewportHeight);
            window.visualViewport.addEventListener('scroll', adjustViewportHeight);
        }
        window.addEventListener('resize', adjustViewportHeight);

        // テキストボックスフォーカス時にも全体スクロールの発生を防ぐ
        editor.addEventListener('focus', () => {
            setTimeout(() => {
                window.scrollTo(0, 0);
            }, 50);
        });

        // 1. 初期化（ストレージ復元 ＆ テーマ設定確認）
        window.addEventListener('DOMContentLoaded', () => {
            adjustViewportHeight();

            const savedText = localStorage.getItem('local_editor_text');
            if (savedText) {
                editor.value = savedText;
                updateStats();
            }

            const savedTheme = localStorage.getItem('editor_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-theme');
            }

            const savedFont = localStorage.getItem('editor_font');
            if (savedFont) {
                fontSelect.value = savedFont;
                editor.className = savedFont;
            }
        });

        // 2. 入力時の自動保存 ＆ 文字数カウント（デバウンス処理で省電力化）
        let saveTimeout = null;
        editor.addEventListener('input', () => {
            // 文字数や行数のカウントはメモリ上の軽い処理なのでリアルタイムで即時更新
            updateStats();

            // LocalStorageへの書き込みは重いため、タイピングが止まってから500ms後にまとめて行う
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('local_editor_text', editor.value);
            }, 500); // 0.5秒間キー入力がなければ保存
        });

        function updateStats() {
            const text = editor.value;
            const chars = text.length;
            const lines = text.split('\n').length;
            charCount.textContent = `文字数: ${chars} | 行数: ${lines}`;
        }

        // 3. ライト/ダークモード切り替え
        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('editor_theme', isDark ? 'dark' : 'light');
        });

        // 4. フォント切り替え
        fontSelect.addEventListener('change', (e) => {
            const selectedClass = e.target.value;
            editor.className = selectedClass;
            localStorage.setItem('editor_font', selectedClass);
        });

        // 5. パネルの開閉
        searchToggleBtn.addEventListener('click', () => {
            searchPanel.classList.toggle('active');
            if (searchPanel.classList.contains('active')) {
                searchInput.focus();
                searchInput.select();
            }
        });

        btnCloseSearch.addEventListener('click', () => {
            searchPanel.classList.remove('active');
            searchStatus.textContent = "";
            editor.focus();
        });

        // 6. 検索機能
        btnFindNext.addEventListener('click', findNext);
        
        function findNext() {
            const searchStr = searchInput.value;
            if (!searchStr) return;

            const text = editor.value;
            let index = text.indexOf(searchStr, lastSearchIndex);

            if (index === -1) {
                index = text.indexOf(searchStr, 0);
            }

            if (index !== -1) {
                editor.focus();
                editor.setSelectionRange(index, index + searchStr.length);
                lastSearchIndex = index + searchStr.length;
                searchStatus.textContent = "見つかりました";
                
                // スクロール位置調整
                const row = text.substring(0, index).split('\n').length;
                editor.scrollTop = (row - 3) * 25; 
            } else {
                searchStatus.textContent = "一致する文字列がありません";
                lastSearchIndex = 0;
            }
        }

        // 7. 置換機能
        btnReplace.addEventListener('click', () => {
            const searchStr = searchInput.value;
            const replaceStr = replaceInput.value;
            if (!searchStr) return;

            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selectedText = editor.value.substring(start, end);

            if (selectedText === searchStr) {
                editor.value = editor.value.substring(0, start) + replaceStr + editor.value.substring(end);
                editor.setSelectionRange(start, start + replaceStr.length);
                localStorage.setItem('local_editor_text', editor.value);
                updateStats();
                findNext();
            } else {
                findNext();
            }
        });

        // 8. すべて置換
        btnReplaceAll.addEventListener('click', () => {
            const searchStr = searchInput.value;
            const replaceStr = replaceInput.value;
            if (!searchStr) return;

            const text = editor.value;
            const parts = text.split(searchStr);
            const count = parts.length - 1;

            if (count > 0) {
                editor.value = parts.join(replaceStr);
                localStorage.setItem('local_editor_text', editor.value);
                updateStats();
                searchStatus.textContent = `${count} 箇所を置換しました`;
            } else {
                searchStatus.textContent = "置換対象が見つかりません";
            }
        });

        // 9. %位置への移動機能
        btnJumpPercent.addEventListener('click', () => {
            let percent = parseFloat(jumpPercentInput.value);
            if (isNaN(percent)) return;
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            const text = editor.value;
            const totalChars = text.length;
            if (totalChars === 0) return;

            const targetIndex = Math.floor(totalChars * (percent / 100));

            editor.focus();
            editor.setSelectionRange(targetIndex, targetIndex);

            const scrollHeight = editor.scrollHeight;
            const clientHeight = editor.clientHeight;
            editor.scrollTop = (scrollHeight - clientHeight) * (percent / 100);

            searchStatus.textContent = `全体の ${percent}% 位置に移動しました`;
        });

        // ショートカットキー設定 (Ctrl+F または Cmd+F)
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
                e.preventDefault();
                searchPanel.classList.add('active');
                searchInput.focus();
                searchInput.select();
            }
        });

        // 10. TXTファイルとしてダウンロード
        downloadBtn.addEventListener('click', () => {
            const textContent = editor.value;
            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            
            let filename = filenameInput.value.trim();
            if (!filename) filename = 'document';
            filename += '.txt';

            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        });

        // Tabキーでスペース4つを挿入する挙動
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                localStorage.setItem('local_editor_text', editor.value);
                updateStats();
            }
        });
    </script>
</body>
</html>
